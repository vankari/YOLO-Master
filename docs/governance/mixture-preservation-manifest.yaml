checkpoint_contracts:
  full_model:
    source: ultralytics/engine/trainer.py
    entrypoints:
    - BaseTrainer.save_model
    - BaseTrainer.resume_training
    required_fields:
    - model
    - ema
    - optimizer
    - scaler
    - train_args
    target_status: adapted
  lora_adapter:
    source: ultralytics/utils/lora/io.py
    entrypoints:
    - save_lora_adapters
    - load_lora_adapters
    required_files:
    - adapter_config.json
    - runtime_metadata.json
    target_status: adapted
  molora_adapter:
    source: ultralytics/nn/peft/molora/model.py
    entrypoints:
    - MoLoRAModel.save_checkpoint
    - MoLoRAModel.load_checkpoint
    required_fields:
    - schema_version
    - format
    - config
    - state_dict
    schema_version: 1
    format: molora_adapter
    target_status: adapted
