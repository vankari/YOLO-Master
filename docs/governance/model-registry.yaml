schema_version: 1
last_verified_commit: working-tree-20260717-p0-p1
verification_policy:
  parse: model configuration parses successfully
  forward: model executes the recorded smoke-test shape
  unit_tests: routed block contracts pass focused pytest coverage
  component_export_roundtrip: representative routed blocks pass TorchScript and ONNX Runtime numerical comparison
  component_compile: representative routed blocks execute through the existing torch.compile entrypoint
  full_model_export_roundtrip: complete model artifact reloads and matches eager output
export_status_values: [unverified, component_roundtrip, full_model_roundtrip, blocked]
