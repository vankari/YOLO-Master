# YOLO-Master CI/CD Pipeline
# P0-2: Basic CI guard — lint, import check, MoE stability test, model build test
name: YOLO-Master CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff isort
      - name: Ruff check
        run: ruff check ultralytics/ --select E,F,W --ignore E501
      - name: Import check
        run: |
          python -c "import ultralytics; print('Version:', ultralytics.__version__)"
          python -c "from ultralytics.nn.modules.moe import STABLE_MOE_CLASSES, EXPERIMENTAL_MOE_CLASSES, is_stable_moe, is_experimental_moe; print('MoE tiers loaded OK')"

  moe-stability-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: MoE tier consistency
        run: |
          python -c "
          from ultralytics.nn.modules.moe import STABLE_MOE_CLASSES, EXPERIMENTAL_MOE_CLASSES
          overlap = STABLE_MOE_CLASSES & EXPERIMENTAL_MOE_CLASSES
          assert not overlap, f'STABLE/EXPERIMENTAL overlap: {overlap}'
          assert 'OptimalHybridGateMoE' in STABLE_MOE_CLASSES, 'stable hybrid MoE missing from STABLE'
          assert 'ES_MOE' in STABLE_MOE_CLASSES, 'ES_MOE missing from STABLE'
          print('MoE tier consistency: PASS')
          "
      - name: Model build test (stable config)
        run: |
          python -c "
          from ultralytics import YOLO
          model = YOLO('yolo-master-v0_stable.yaml')
          moe_layers = [m.__class__.__name__ for m in model.model.modules() if 'MoE' in m.__class__.__name__]
          assert len(moe_layers) > 0, 'No MoE layers found in stable config'
          print(f'Stable model build: PASS ({len(moe_layers)} MoE layers)')
          "
      - name: MoE unit tests
        run: python -m pytest tests/test_moe.py -x -q --no-header --tb=short

  mixture-p0-regression:
    name: Mixture P0 regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and CPU torch
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Configuration and adapter integrity
        run: python -m pytest -q tests/test_default_config_integrity.py tests/test_master_model_configs.py tests/test_molora_dtype.py --tb=long
      - name: Core mixture smoke tests
        run: python -m pytest -q tests/test_moe.py tests/test_moa.py tests/test_mot.py --tb=long
      - name: Compile core mixture packages
        run: python -m compileall -q ultralytics/nn/modules ultralytics/nn/peft ultralytics/utils/lora ultralytics/vpeft

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - name: Verify independent version
        run: |
          python -c "
          import ultralytics
          v = ultralytics.__version__
          assert 'master' in v, f'Version not independent: {v}'
          print(f'Version check: PASS ({v})')
          "

  ddp-cpu-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and CPU torch
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Two-process MoA/MoT gloo smoke
        run: python -m torch.distributed.run --standalone --nproc_per_node=2 tests/ddp_moa_mot_smoke.py
