name: RepoWiki consistency

on:
  pull_request:
    paths:
      - "wiki/repowiki/**"
      - "wiki-content/**"
      - "wiki-*.html"
      - "wiki-assets/**"
      - "scripts/sync_repowiki.py"
      - ".github/workflows/repowiki.yml"
  push:
    branches: [main]
    paths:
      - "wiki/repowiki/**"
      - "wiki-content/**"
      - "wiki-*.html"
      - "wiki-assets/**"
      - "scripts/sync_repowiki.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run trusted base-branch validator for pull requests
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git show "$BASE_SHA:scripts/sync_repowiki.py" > "$RUNNER_TEMP/sync_repowiki.py"
          python "$RUNNER_TEMP/sync_repowiki.py" --source wiki/repowiki --dest wiki-content --check
      - name: Check committed snapshot
        if: github.event_name != 'pull_request'
        run: python scripts/sync_repowiki.py --check
